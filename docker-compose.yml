version: '3.8'

services:

  # ── Web Statis (Nginx) ──
  web-static:
    image: nginx:alpine
    container_name: web-static
    volumes:
      - ./web-static:/usr/share/nginx/html:ro
    networks:
      - appnet

  # ── Web Dinamis (PHP + Apache) ──
  web-dinamis:
    build:
      context: ./perpustakaan
    container_name: web-dinamis
    environment:
      DB_HOST: db
      DB_NAME: perpustakaan
      DB_USER: root
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  # ── MariaDB ──
  db:
    image: mariadb:10.11
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: perpustakaan
    volumes:
      - db_data:/var/lib/mysql
      - ./perpustakaan/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-static
      - web-dinamis
    networks:
      - appnet

volumes:
  db_data:

networks:
  appnet:
    driver: bridge
